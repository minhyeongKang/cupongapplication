<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('주문 상세')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="container my-5">
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/orders}" class="btn btn-outline-secondary btn-sm me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h4 class="fw-bold mb-0" th:text="'주문 #' + ${order.id}">주문 상세</h4>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- 배송 상태 타임라인 -->
    <div class="card shadow-sm mb-4">
        <div class="card-body py-4">
            <div th:if="${order.status.name() != 'CANCELLED'}">
                <div class="d-flex justify-content-between align-items-center position-relative">
                    <div class="position-absolute top-50 start-0 end-0 translate-middle-y"
                         style="height: 3px; background: #dee2e6; z-index: 0; margin: 0 40px;"></div>

                    <th:block th:with="currentIdx=${order.status.name() == 'PENDING' ? 0 : order.status.name() == 'PAID' ? 1 : order.status.name() == 'SHIPPING' ? 2 : 3}">
                        <div class="text-center position-relative" style="z-index:1; width:25%;">
                            <div class="mx-auto rounded-circle d-flex align-items-center justify-content-center"
                                 style="width:50px;height:50px;"
                                 th:classappend="${0 <= currentIdx} ? 'bg-cupong text-white' : 'bg-light text-muted border'">
                                <i class="bi bi-receipt"></i>
                            </div>
                            <p class="small mt-2 mb-0 fw-semibold"
                               th:classappend="${0 <= currentIdx} ? 'text-cupong' : 'text-muted'">주문 접수</p>
                            <small class="text-muted" th:text="${#temporals.format(order.createdAt, 'MM-dd HH:mm')}"></small>
                        </div>
                        <div class="text-center position-relative" style="z-index:1; width:25%;">
                            <div class="mx-auto rounded-circle d-flex align-items-center justify-content-center"
                                 style="width:50px;height:50px;"
                                 th:classappend="${1 <= currentIdx} ? 'bg-cupong text-white' : 'bg-light text-muted border'">
                                <i class="bi bi-check-circle"></i>
                            </div>
                            <p class="small mt-2 mb-0 fw-semibold"
                               th:classappend="${1 <= currentIdx} ? 'text-cupong' : 'text-muted'">주문 승인</p>
                        </div>
                        <div class="text-center position-relative" style="z-index:1; width:25%;">
                            <div class="mx-auto rounded-circle d-flex align-items-center justify-content-center"
                                 style="width:50px;height:50px;"
                                 th:classappend="${2 <= currentIdx} ? 'bg-cupong text-white' : 'bg-light text-muted border'">
                                <i class="bi bi-truck"></i>
                            </div>
                            <p class="small mt-2 mb-0 fw-semibold"
                               th:classappend="${2 <= currentIdx} ? 'text-cupong' : 'text-muted'">배송 중</p>
                            <small th:if="${order.trackingNumber != null}" class="text-primary fw-semibold"
                                   th:text="'운송장: ' + ${order.trackingNumber}"></small>
                        </div>
                        <div class="text-center position-relative" style="z-index:1; width:25%;">
                            <div class="mx-auto rounded-circle d-flex align-items-center justify-content-center"
                                 style="width:50px;height:50px;"
                                 th:classappend="${3 <= currentIdx} ? 'bg-cupong text-white' : 'bg-light text-muted border'">
                                <i class="bi bi-house-check"></i>
                            </div>
                            <p class="small mt-2 mb-0 fw-semibold"
                               th:classappend="${3 <= currentIdx} ? 'text-cupong' : 'text-muted'">배송 완료</p>
                        </div>
                    </th:block>
                </div>
            </div>
            <div th:if="${order.status.name() == 'CANCELLED'}" class="text-center py-2">
                <span class="badge bg-secondary fs-6 px-4 py-2">
                    <i class="bi bi-x-circle"></i> 취소된 주문입니다.
                </span>
            </div>
        </div>
    </div>

    <div class="row">
        <!-- 주문 상품 -->
        <div class="col-lg-8 mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-white fw-bold">주문 상품</div>
                <div class="list-group list-group-flush">
                    <div class="list-group-item py-3" th:each="item : ${order.orderItems}">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center gap-3">
                                <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : 'https://placehold.co/60x60?text=IMG'}"
                                     style="width:60px;height:60px;object-fit:cover;" class="rounded">
                                <div>
                                    <p class="fw-semibold mb-0" th:text="${item.product.name}">상품명</p>
                                    <small class="text-muted"
                                           th:text="'₩' + ${#numbers.formatInteger(item.orderPrice, 1, 'COMMA')} + ' × ' + ${item.quantity} + '개'"></small>
                                </div>
                            </div>
                            <span class="fw-bold"
                                  th:text="'₩' + ${#numbers.formatInteger(item.orderPrice * item.quantity, 1, 'COMMA')}"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 주문 정보 -->
        <div class="col-lg-4">
            <div class="card shadow-sm mb-3">
                <div class="card-header bg-white fw-bold">결제 정보</div>
                <div class="card-body">
                    <dl class="row small mb-0">
                        <dt class="col-5 text-muted">주문일시</dt>
                        <dd class="col-7" th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}">-</dd>
                        <dt class="col-5 text-muted">배송지</dt>
                        <dd class="col-7" th:text="${order.deliveryAddress}">-</dd>
                        <th:block th:if="${order.trackingNumber != null}">
                            <dt class="col-5 text-muted">운송장</dt>
                            <dd class="col-7">
                                <span class="badge bg-primary" th:text="${order.trackingNumber}"></span>
                            </dd>
                        </th:block>
                    </dl>
                    <hr>
                    <div class="d-flex justify-content-between fw-bold">
                        <span>총 결제금액</span>
                        <span class="text-cupong"
                              th:text="'₩' + ${#numbers.formatInteger(order.totalPrice, 1, 'COMMA')}">₩0</span>
                    </div>
                </div>
            </div>

            <!-- 취소 버튼 (PENDING만) -->
            <form th:if="${order.status.name() == 'PENDING'}"
                  th:action="@{/orders/{id}/cancel(id=${order.id})}" method="post"
                  onsubmit="return confirm('주문을 취소하시겠습니까?')">
                <button type="submit" class="btn btn-outline-danger w-100">
                    <i class="bi bi-x-circle"></i> 주문 취소
                </button>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
