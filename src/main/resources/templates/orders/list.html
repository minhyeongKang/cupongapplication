<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('주문 내역')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="container my-5">
    <h4 class="fw-bold mb-4"><i class="bi bi-receipt"></i> 주문 내역</h4>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div th:if="${orders.content.empty}" class="text-center py-5">
        <i class="bi bi-bag-x display-4 text-muted"></i>
        <p class="text-muted mt-3">주문 내역이 없습니다.</p>
        <a th:href="@{/products}" class="btn btn-cupong">쇼핑 시작하기</a>
    </div>

    <div class="card shadow-sm" th:unless="${orders.content.empty}">
        <div class="list-group list-group-flush">
            <div class="list-group-item py-3" th:each="order : ${orders.content}">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="mb-1 small text-muted"
                           th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}">2025-01-01</p>
                        <h6 class="mb-1 fw-semibold" th:text="'주문번호: #' + ${order.id}">주문번호</h6>
                        <p class="mb-1 small">
                            상품 <span th:text="${order.orderItems.size()}">0</span>종 ·
                            <span class="fw-bold text-cupong"
                                  th:text="'₩' + ${#numbers.formatInteger(order.totalPrice, 1, 'COMMA')}">₩0</span>
                        </p>
                        <p class="mb-0 small text-muted" th:text="'배송지: ' + ${order.deliveryAddress}">배송지</p>
                    </div>
                    <div class="text-end">
                        <span class="badge mb-2"
                              th:classappend="${order.status.name() == 'CANCELLED'} ? 'bg-secondary' : (${order.status.name() == 'DELIVERED'} ? 'bg-success' : 'bg-primary')"
                              th:text="${order.status}">상태</span>
                        <br>
                        <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-outline-secondary btn-sm">상세보기</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 페이지네이션 -->
    <nav th:if="${orders.totalPages > 1}" class="mt-4 d-flex justify-content-center">
        <ul class="pagination">
            <li class="page-item" th:classappend="${orders.first} ? 'disabled'">
                <a class="page-link" th:href="@{/orders(page=${orders.number - 1})}">이전</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, orders.totalPages - 1)}"
                th:classappend="${i == orders.number} ? 'active'">
                <a class="page-link" th:text="${i + 1}" th:href="@{/orders(page=${i})}">1</a>
            </li>
            <li class="page-item" th:classappend="${orders.last} ? 'disabled'">
                <a class="page-link" th:href="@{/orders(page=${orders.number + 1})}">다음</a>
            </li>
        </ul>
    </nav>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
