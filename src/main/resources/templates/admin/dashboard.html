<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('관리자 대시보드')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="container my-5">
    <h4 class="fw-bold mb-4"><i class="bi bi-gear-fill"></i> 관리자 대시보드</h4>

    <!-- 빠른 메뉴 -->
    <div class="row g-3 mb-5">
        <div class="col-6 col-md-3">
            <a th:href="@{/admin/products}" class="text-decoration-none">
                <div class="card text-center py-3 shadow-sm h-100">
                    <div class="card-body">
                        <i class="bi bi-box-seam display-5 text-cupong"></i>
                        <p class="fw-semibold mt-2 mb-0">상품 관리</p>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-3">
            <a th:href="@{/admin/categories}" class="text-decoration-none">
                <div class="card text-center py-3 shadow-sm h-100">
                    <div class="card-body">
                        <i class="bi bi-tag display-5 text-primary"></i>
                        <p class="fw-semibold mt-2 mb-0">카테고리 관리</p>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-3">
            <a th:href="@{/admin/orders}" class="text-decoration-none">
                <div class="card text-center py-3 shadow-sm h-100">
                    <div class="card-body">
                        <i class="bi bi-receipt display-5 text-success"></i>
                        <p class="fw-semibold mt-2 mb-0">주문 관리</p>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-3">
            <a th:href="@{/admin/products/new}" class="text-decoration-none">
                <div class="card text-center py-3 shadow-sm h-100">
                    <div class="card-body">
                        <i class="bi bi-plus-circle display-5 text-warning"></i>
                        <p class="fw-semibold mt-2 mb-0">상품 등록</p>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- 최근 주문 -->
    <h5 class="fw-bold mb-3">최근 주문</h5>
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>주문번호</th>
                        <th>회원</th>
                        <th>금액</th>
                        <th>상태</th>
                        <th>주문일시</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${recentOrders.content}">
                        <td><a th:href="@{/orders/{id}(id=${order.id})}" th:text="'#' + ${order.id}">#0</a></td>
                        <td th:text="${order.member.name}">홍길동</td>
                        <td th:text="'₩' + ${#numbers.formatInteger(order.totalPrice, 1, 'COMMA')}">₩0</td>
                        <td><span class="badge bg-primary" th:text="${order.status}">상태</span></td>
                        <td th:text="${#temporals.format(order.createdAt, 'MM-dd HH:mm')}">-</td>
                    </tr>
                    <tr th:if="${recentOrders.content.empty}">
                        <td colspan="5" class="text-center text-muted py-3">주문이 없습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
