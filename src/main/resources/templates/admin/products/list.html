<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('상품 관리')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">상품 관리</h4>
        <a th:href="@{/admin/products/new}" class="btn btn-cupong">
            <i class="bi bi-plus-lg"></i> 상품 등록
        </a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>상품명</th>
                        <th>카테고리</th>
                        <th>가격</th>
                        <th>재고</th>
                        <th>등록일</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products.content}">
                        <td th:text="${product.id}">1</td>
                        <td>
                            <a th:href="@{/products/{id}(id=${product.id})}" th:text="${product.name}"
                               class="text-decoration-none text-dark fw-semibold">상품명</a>
                        </td>
                        <td th:text="${product.category?.name ?: '-'}">카테고리</td>
                        <td th:text="'₩' + ${#numbers.formatInteger(product.price, 1, 'COMMA')}">₩0</td>
                        <td>
                            <span th:text="${product.stock}" th:classappend="${product.stock == 0} ? 'text-danger fw-bold'">0</span>
                        </td>
                        <td th:text="${#temporals.format(product.createdAt, 'yyyy-MM-dd')}">-</td>
                        <td>
                            <a th:href="@{/admin/products/{id}/edit(id=${product.id})}"
                               class="btn btn-sm btn-outline-primary me-1">수정</a>
                            <form th:action="@{/admin/products/{id}/delete(id=${product.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('상품을 삭제하시겠습니까?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${products.content.empty}">
                        <td colspan="7" class="text-center text-muted py-3">등록된 상품이 없습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 페이지네이션 -->
    <nav th:if="${products.totalPages > 1}" class="mt-4 d-flex justify-content-center">
        <ul class="pagination">
            <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/products(page=${products.number - 1})}">이전</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                th:classappend="${i == products.number} ? 'active'">
                <a class="page-link" th:text="${i + 1}" th:href="@{/admin/products(page=${i})}">1</a>
            </li>
            <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/products(page=${products.number + 1})}">다음</a>
            </li>
        </ul>
    </nav>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
