<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('상품 등록/수정')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="d-flex align-items-center mb-4">
                <a th:href="@{/admin/products}" class="btn btn-outline-secondary btn-sm me-3">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h4 class="fw-bold mb-0" th:text="${product != null} ? '상품 수정' : '상품 등록'">상품 등록</h4>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form th:action="${product != null} ? @{/admin/products/{id}/edit(id=${product.id})} : @{/admin/products/new}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">상품명 <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control"
                                   th:value="${product?.name}" placeholder="상품명을 입력하세요" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">카테고리 <span class="text-danger">*</span></label>
                            <select name="categoryId" class="form-select" required>
                                <option value="">카테고리 선택</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}"
                                        th:selected="${product?.category?.id == cat.id}">카테고리</option>
                            </select>
                        </div>

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label fw-semibold">가격 (₩) <span class="text-danger">*</span></label>
                                <input type="number" name="price" class="form-control"
                                       th:value="${product?.price}" min="0" placeholder="0" required>
                            </div>
                            <div class="col">
                                <label class="form-label fw-semibold">재고 <span class="text-danger">*</span></label>
                                <input type="number" name="stock" class="form-control"
                                       th:value="${product?.stock}" min="0" placeholder="0" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">이미지 URL</label>
                            <input type="url" name="imageUrl" class="form-control"
                                   th:value="${product?.imageUrl}" placeholder="https://...">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">상품 설명</label>
                            <textarea name="description" class="form-control" rows="5"
                                      placeholder="상품에 대한 상세 설명을 입력하세요."
                                      th:text="${product?.description}"></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-cupong flex-grow-1"
                                    th:text="${product != null} ? '수정하기' : '등록하기'">등록하기</button>
                            <a th:href="@{/admin/products}" class="btn btn-outline-secondary flex-grow-1">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
