<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('주문 관리')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="container my-5">
    <h4 class="fw-bold mb-4">주문 관리</h4>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <!-- 상태 필터 -->
    <div class="d-flex flex-wrap gap-2 mb-3">
        <a th:href="@{/admin/orders}"
           th:classappend="${currentStatus == null} ? 'active'" class="btn btn-sm btn-outline-secondary">
            전체
        </a>
        <a th:href="@{/admin/orders(status='PENDING')}"
           th:classappend="${currentStatus?.name() == 'PENDING'} ? 'active'" class="btn btn-sm btn-outline-warning">
            주문 접수
        </a>
        <a th:href="@{/admin/orders(status='PAID')}"
           th:classappend="${currentStatus?.name() == 'PAID'} ? 'active'" class="btn btn-sm btn-outline-success">
            주문 승인
        </a>
        <a th:href="@{/admin/orders(status='SHIPPING')}"
           th:classappend="${currentStatus?.name() == 'SHIPPING'} ? 'active'" class="btn btn-sm btn-outline-primary">
            배송 중
        </a>
        <a th:href="@{/admin/orders(status='DELIVERED')}"
           th:classappend="${currentStatus?.name() == 'DELIVERED'} ? 'active'" class="btn btn-sm btn-outline-info">
            배송 완료
        </a>
        <a th:href="@{/admin/orders(status='CANCELLED')}"
           th:classappend="${currentStatus?.name() == 'CANCELLED'} ? 'active'" class="btn btn-sm btn-outline-dark">
            취소
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                    <tr>
                        <th>주문번호</th>
                        <th>주문자</th>
                        <th>금액</th>
                        <th>상태</th>
                        <th>주문일시</th>
                        <th>처리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders.content}">
                        <td th:text="'#' + ${order.id}">#0</td>
                        <td th:text="${order.member.name}">홍길동</td>
                        <td th:text="'₩' + ${#numbers.formatInteger(order.totalPrice, 1, 'COMMA')}">₩0</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${order.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                                  (${order.status.name() == 'PAID'} ? 'bg-success' :
                                                  (${order.status.name() == 'SHIPPING'} ? 'bg-primary' :
                                                  (${order.status.name() == 'DELIVERED'} ? 'bg-info text-dark' : 'bg-secondary')))"
                                  th:text="${order.status.name() == 'PENDING'} ? '주문 접수' :
                                           (${order.status.name() == 'PAID'} ? '주문 승인' :
                                           (${order.status.name() == 'SHIPPING'} ? '배송 중' :
                                           (${order.status.name() == 'DELIVERED'} ? '배송 완료' : '취소')))">상태</span>
                        </td>
                        <td th:text="${#temporals.format(order.createdAt, 'MM-dd HH:mm')}">-</td>
                        <td>
                            <a th:href="@{/admin/orders/{id}(id=${order.id})}"
                               class="btn btn-sm btn-cupong">처리하기</a>
                        </td>
                    </tr>
                    <tr th:if="${orders.content.empty}">
                        <td colspan="6" class="text-center text-muted py-4">주문이 없습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:if="${orders.totalPages > 1}" class="mt-4 d-flex justify-content-center">
        <ul class="pagination">
            <li class="page-item" th:classappend="${orders.first} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/orders(page=${orders.number - 1}, status=${currentStatus})}">이전</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, orders.totalPages - 1)}"
                th:classappend="${i == orders.number} ? 'active'">
                <a class="page-link" th:text="${i + 1}" th:href="@{/admin/orders(page=${i}, status=${currentStatus})}">1</a>
            </li>
            <li class="page-item" th:classappend="${orders.last} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/orders(page=${orders.number + 1}, status=${currentStatus})}">다음</a>
            </li>
        </ul>
    </nav>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
