<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('주문 처리')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="container my-5">
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/admin/orders}" class="btn btn-outline-secondary btn-sm me-3">
            <i class="bi bi-arrow-left"></i> 목록
        </a>
        <h4 class="fw-bold mb-0" th:text="'주문 #' + ${order.id}">주문 상세</h4>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- 배송 상태 타임라인 -->
    <div class="card shadow-sm mb-4">
        <div class="card-body py-4">
            <div class="d-flex justify-content-between align-items-center position-relative">
                <!-- 연결선 -->
                <div class="position-absolute top-50 start-0 end-0 translate-middle-y"
                     style="height: 3px; background: #dee2e6; z-index: 0; margin: 0 40px;"></div>

                <th:block th:with="steps=${ {'PENDING','PAID','SHIPPING','DELIVERED'} },
                                   labels=${ {'주문 접수','주문 승인','배송 중','배송 완료'} },
                                   icons=${ {'bi-receipt','bi-check-circle','bi-truck','bi-house-check'} },
                                   currentIdx=${order.status.name() == 'PENDING' ? 0 : order.status.name() == 'PAID' ? 1 : order.status.name() == 'SHIPPING' ? 2 : order.status.name() == 'DELIVERED' ? 3 : -1}">
                    <div th:each="step,i : ${steps}" class="text-center position-relative" style="z-index: 1; width: 25%;">
                        <div class="mx-auto rounded-circle d-flex align-items-center justify-content-center fw-bold"
                             style="width:50px; height:50px; font-size:1.2rem;"
                             th:classappend="${i.index <= currentIdx} ? 'bg-cupong text-white' : 'bg-light text-muted border'">
                            <i th:class="'bi ' + ${icons[i.index]}"></i>
                        </div>
                        <p class="small mt-2 mb-0 fw-semibold"
                           th:text="${labels[i.index]}"
                           th:classappend="${i.index <= currentIdx} ? 'text-cupong' : 'text-muted'">단계</p>
                    </div>
                </th:block>

                <!-- 취소된 경우 -->
                <div th:if="${order.status.name() == 'CANCELLED'}"
                     class="position-absolute top-0 start-0 end-0 bottom-0 d-flex align-items-center justify-content-center"
                     style="z-index: 2; background: rgba(255,255,255,0.8);">
                    <span class="badge bg-secondary fs-6 px-4 py-2">주문 취소됨</span>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <!-- 주문 상품 -->
        <div class="col-lg-7 mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-white fw-bold">주문 상품</div>
                <div class="list-group list-group-flush">
                    <div class="list-group-item py-3" th:each="item : ${order.orderItems}">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center gap-3">
                                <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : 'https://placehold.co/60x60?text=IMG'}"
                                     style="width:60px;height:60px;object-fit:cover;" class="rounded">
                                <div>
                                    <p class="fw-semibold mb-0" th:text="${item.product.name}">상품명</p>
                                    <small class="text-muted"
                                           th:text="'₩' + ${#numbers.formatInteger(item.orderPrice, 1, 'COMMA')} + ' × ' + ${item.quantity} + '개'"></small>
                                </div>
                            </div>
                            <span class="fw-bold"
                                  th:text="'₩' + ${#numbers.formatInteger(item.orderPrice * item.quantity, 1, 'COMMA')}"></span>
                        </div>
                    </div>
                </div>
                <div class="card-footer bg-white d-flex justify-content-between fw-bold">
                    <span>총 결제금액</span>
                    <span class="text-cupong"
                          th:text="'₩' + ${#numbers.formatInteger(order.totalPrice, 1, 'COMMA')}"></span>
                </div>
            </div>
        </div>

        <!-- 주문 정보 + 처리 버튼 -->
        <div class="col-lg-5">
            <div class="card shadow-sm mb-3">
                <div class="card-header bg-white fw-bold">주문 정보</div>
                <div class="card-body">
                    <dl class="row small mb-0">
                        <dt class="col-4 text-muted">주문번호</dt>
                        <dd class="col-8" th:text="'#' + ${order.id}"></dd>
                        <dt class="col-4 text-muted">주문자</dt>
                        <dd class="col-8" th:text="${order.member.name} + ' (' + ${order.member.email} + ')'"></dd>
                        <dt class="col-4 text-muted">주문일시</dt>
                        <dd class="col-8" th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></dd>
                        <dt class="col-4 text-muted">배송지</dt>
                        <dd class="col-8" th:text="${order.deliveryAddress}"></dd>
                        <th:block th:if="${order.trackingNumber != null}">
                            <dt class="col-4 text-muted">운송장 번호</dt>
                            <dd class="col-8">
                                <span class="badge bg-primary" th:text="${order.trackingNumber}"></span>
                            </dd>
                        </th:block>
                    </dl>
                </div>
            </div>

            <!-- 처리 버튼 -->
            <div class="card shadow-sm">
                <div class="card-header bg-white fw-bold">주문 처리</div>
                <div class="card-body d-grid gap-2">

                    <!-- 주문 승인 (PENDING → PAID) -->
                    <form th:if="${order.status.name() == 'PENDING'}"
                          th:action="@{/admin/orders/{id}/approve(id=${order.id})}" method="post"
                          onsubmit="return confirm('주문을 승인하시겠습니까?')">
                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-check-circle"></i> 주문 승인
                        </button>
                    </form>

                    <!-- 배송 시작 (PAID → SHIPPING) -->
                    <form th:if="${order.status.name() == 'PAID'}"
                          th:action="@{/admin/orders/{id}/ship(id=${order.id})}" method="post">
                        <div class="input-group mb-2">
                            <span class="input-group-text"><i class="bi bi-truck"></i></span>
                            <input type="text" name="trackingNumber" class="form-control"
                                   placeholder="운송장 번호 입력" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-truck"></i> 배송 시작
                        </button>
                    </form>

                    <!-- 배송 중 안내 -->
                    <div th:if="${order.status.name() == 'SHIPPING'}"
                         class="alert alert-primary mb-0 text-center small">
                        <i class="bi bi-truck"></i> 배송 중입니다. 배송 완료는 배송기사가 처리합니다.
                    </div>

                    <!-- 배송 완료 상태 -->
                    <div th:if="${order.status.name() == 'DELIVERED'}"
                         class="alert alert-success mb-0 text-center">
                        <i class="bi bi-check-circle-fill"></i> 배송이 완료된 주문입니다.
                    </div>

                    <!-- 취소 버튼 (PENDING, PAID만) -->
                    <form th:if="${order.status.name() == 'PENDING' or order.status.name() == 'PAID'}"
                          th:action="@{/admin/orders/{id}/cancel(id=${order.id})}" method="post"
                          onsubmit="return confirm('주문을 취소하시겠습니까?')">
                        <button type="submit" class="btn btn-outline-danger w-100">
                            <i class="bi bi-x-circle"></i> 주문 취소
                        </button>
                    </form>

                    <!-- 취소 상태 -->
                    <div th:if="${order.status.name() == 'CANCELLED'}"
                         class="alert alert-secondary mb-0 text-center">
                        <i class="bi bi-x-circle-fill"></i> 취소된 주문입니다.
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
