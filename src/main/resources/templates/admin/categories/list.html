<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('카테고리 관리')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="container my-5">
    <h4 class="fw-bold mb-4">카테고리 관리</h4>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="row g-4">
        <!-- 최상위 카테고리 추가 -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header fw-bold bg-white">최상위 카테고리 추가</div>
                <div class="card-body">
                    <form th:action="@{/admin/categories}" method="post" class="d-flex gap-2">
                        <input type="text" name="name" class="form-control" placeholder="카테고리명" required>
                        <button type="submit" class="btn btn-cupong">추가</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- 카테고리 목록 -->
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header fw-bold bg-white">카테고리 목록</div>
                <div class="list-group list-group-flush">
                    <div th:each="cat : ${topCategories}" class="list-group-item">
                        <!-- 최상위 카테고리 헤더 -->
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="fw-semibold">
                                <i class="bi bi-folder2 me-1 text-warning"></i>
                                <span th:text="${cat.name}">카테고리</span>
                            </span>
                            <div class="d-flex gap-1">
                                <button type="button" class="btn btn-sm btn-outline-secondary"
                                        onclick="openRenameModal(this)"
                                        th:data-id="${cat.id}"
                                        th:data-name="${cat.name}">
                                    수정
                                </button>
                                <form th:action="@{/admin/categories/{id}/delete(id=${cat.id})}" method="post"
                                      onsubmit="return confirm('카테고리를 삭제하시겠습니까?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
                                </form>
                            </div>
                        </div>

                        <!-- 하위 카테고리 -->
                        <div th:if="${!cat.children.empty}" class="ms-3 mb-2 d-flex flex-wrap gap-1">
                            <span th:each="sub : ${cat.children}"
                                  class="badge bg-light text-dark border d-inline-flex align-items-center gap-1">
                                <span th:text="${sub.name}">하위</span>
                                <button type="button" class="btn-close btn-close-sm p-0 ms-1"
                                        style="font-size:0.6rem"
                                        title="수정"
                                        onclick="openRenameModal(this)"
                                        th:data-id="${sub.id}"
                                        th:data-name="${sub.name}">
                                </button>
                                <form th:action="@{/admin/categories/{id}/delete(id=${sub.id})}" method="post"
                                      class="d-inline" onsubmit="return confirm('하위 카테고리를 삭제하시겠습니까?')">
                                    <button type="submit" class="btn p-0 border-0 bg-transparent text-danger"
                                            style="font-size:0.75rem; line-height:1;">✕</button>
                                </form>
                            </span>
                        </div>

                        <!-- 하위 카테고리 추가 폼 -->
                        <form th:action="@{/admin/categories/{id}/sub(id=${cat.id})}" method="post"
                              class="d-flex gap-2 ms-3">
                            <input type="text" name="name" class="form-control form-control-sm"
                                   placeholder="하위 카테고리명" required>
                            <button type="submit" class="btn btn-sm btn-outline-primary">추가</button>
                        </form>
                    </div>
                    <div th:if="${topCategories.empty}" class="list-group-item text-muted text-center py-3">
                        카테고리가 없습니다.
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- 이름 수정 모달 -->
<div class="modal fade" id="renameModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title">카테고리 이름 수정</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="renameForm" method="post">
                <div class="modal-body">
                    <input type="text" id="renameInput" name="name" class="form-control" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">취소</button>
                    <button type="submit" class="btn btn-cupong btn-sm">저장</button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function openRenameModal(btn) {
        const id = btn.dataset.id;
        const name = btn.dataset.name;
        document.getElementById('renameForm').action = '/admin/categories/' + id + '/rename';
        document.getElementById('renameInput').value = name;
        new bootstrap.Modal(document.getElementById('renameModal')).show();
    }
</script>
</body>
</html>
