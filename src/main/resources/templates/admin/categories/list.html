<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('카테고리 관리')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="container my-5">
    <h4 class="fw-bold mb-4">카테고리 관리</h4>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="row g-4">
        <!-- 최상위 카테고리 추가 -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header fw-bold bg-white">최상위 카테고리 추가</div>
                <div class="card-body">
                    <form th:action="@{/admin/categories}" method="post" class="d-flex gap-2">
                        <input type="text" name="name" class="form-control" placeholder="카테고리명" required>
                        <button type="submit" class="btn btn-cupong">추가</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- 카테고리 목록 -->
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header fw-bold bg-white">카테고리 목록</div>
                <div class="list-group list-group-flush">
                    <div th:each="cat : ${topCategories}" class="list-group-item">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="fw-semibold"><i class="bi bi-folder2 me-1 text-warning"></i> <span th:text="${cat.name}">카테고리</span></span>
                        </div>
                        <!-- 하위 카테고리 -->
                        <div th:if="${!cat.children.empty}" class="ms-3 mb-2">
                            <span th:each="sub : ${cat.children}" class="badge bg-light text-dark border me-1" th:text="${sub.name}">하위</span>
                        </div>
                        <!-- 하위 카테고리 추가 폼 -->
                        <form th:action="@{/admin/categories/{id}/sub(id=${cat.id})}" method="post"
                              class="d-flex gap-2 ms-3">
                            <input type="text" name="name" class="form-control form-control-sm"
                                   placeholder="하위 카테고리명" required>
                            <button type="submit" class="btn btn-sm btn-outline-primary">추가</button>
                        </form>
                    </div>
                    <div th:if="${topCategories.empty}" class="list-group-item text-muted text-center py-3">
                        카테고리가 없습니다.
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
