<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('홈')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav}"></nav>

<div class="bg-cupong text-white py-5">
    <div class="container text-center">
        <h1 class="display-5 fw-bold mb-2"><i class="bi bi-bag-heart-fill"></i> Cupong</h1>
        <p class="lead mb-4">최고의 상품을 최저가로!</p>
        <a th:href="@{/products}" class="btn btn-light btn-lg px-4">
            쇼핑하기 <i class="bi bi-arrow-right"></i>
        </a>
    </div>
</div>

<main class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold mb-0">신상품</h4>
        <a th:href="@{/products}" class="text-cupong text-decoration-none">전체보기 <i class="bi bi-chevron-right"></i></a>
    </div>
    <div class="row row-cols-2 row-cols-md-4 g-4">
        <div class="col" th:each="product : ${products.content}">
            <a th:href="@{/products/{id}(id=${product.id})}" class="text-decoration-none text-dark">
                <div class="card h-100 product-card">
                    <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://placehold.co/300x200?text=No+Image'}"
                         class="card-img-top product-img" th:alt="${product.name}">
                    <div class="card-body p-3">
                        <p class="card-text small text-muted mb-1" th:text="${product.category?.name}">카테고리</p>
                        <h6 class="card-title mb-1" th:text="${product.name}">상품명</h6>
                        <p class="fw-bold text-cupong mb-0"
                           th:text="'₩' + ${#numbers.formatInteger(product.price, 1, 'COMMA')}">₩0</p>
                    </div>
                </div>
            </a>
        </div>
    </div>
    <p th:if="${products.content.empty}" class="text-center text-muted mt-4">등록된 상품이 없습니다.</p>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
