<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('프로필 수정')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h4 class="fw-bold mb-4">프로필 수정</h4>
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/members/edit}" th:object="${memberUpdateRequest}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">이름</label>
                            <input type="text" th:field="*{name}" class="form-control"
                                   th:value="${member.name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">전화번호</label>
                            <input type="text" th:field="*{phone}" class="form-control"
                                   th:value="${member.phone}" placeholder="010-0000-0000">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">주소</label>
                            <!-- 우편번호 + 검색 버튼 -->
                            <div class="input-group mb-2">
                                <input type="text" id="edit-zipcode" class="form-control"
                                       style="max-width: 110px;" placeholder="우편번호" readonly>
                                <button type="button" class="btn btn-outline-secondary"
                                        onclick="openAddressSearch('edit')">
                                    <i class="bi bi-search"></i> 주소 검색
                                </button>
                            </div>
                            <!-- 기본 주소 (자동 입력) -->
                            <input type="text" id="edit-base" class="form-control mb-2"
                                   placeholder="기본 주소" readonly>
                            <!-- 상세 주소 -->
                            <input type="text" id="edit-detail" class="form-control"
                                   placeholder="상세 주소 (동/호수 등)"
                                   oninput="combineAddress('edit')">
                            <!-- 실제 전송 필드 (기존 값 표시) -->
                            <input type="hidden" name="address" id="edit-address"
                                   th:value="${member.address}">
                            <!-- 기존 주소 표시 -->
                            <div th:if="${member.address}" class="mt-2 p-2 bg-light rounded small text-muted">
                                <i class="bi bi-geo-alt"></i> 현재 주소:
                                <span th:text="${member.address}"></span>
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-cupong flex-grow-1">저장</button>
                            <a th:href="@{/members/mypage}" class="btn btn-outline-secondary flex-grow-1">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
    function openAddressSearch(prefix) {
        new daum.Postcode({
            oncomplete: function(data) {
                document.getElementById(prefix + '-zipcode').value = data.zonecode;
                document.getElementById(prefix + '-base').value = data.address;
                combineAddress(prefix);
                document.getElementById(prefix + '-detail').focus();
            }
        }).open();
    }

    function combineAddress(prefix) {
        const zipcode = document.getElementById(prefix + '-zipcode').value;
        const base    = document.getElementById(prefix + '-base').value;
        const detail  = document.getElementById(prefix + '-detail').value.trim();
        const full    = zipcode ? `[${zipcode}] ${base}${detail ? ' ' + detail : ''}` : '';
        document.getElementById(prefix + '-address').value = full;
    }
</script>
</body>
</html>
