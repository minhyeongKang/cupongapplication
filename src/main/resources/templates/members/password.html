<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('비밀번호 변경')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <h4 class="fw-bold mb-4">비밀번호 변경</h4>
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <div th:if="${errorMessage}" class="alert alert-danger small" th:text="${errorMessage}"></div>
                    <form th:action="@{/members/password}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">현재 비밀번호</label>
                            <input type="password" name="currentPassword" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">새 비밀번호</label>
                            <input type="password" name="newPassword" class="form-control"
                                   minlength="8" placeholder="8자 이상" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">새 비밀번호 확인</label>
                            <input type="password" id="confirmPassword" class="form-control" required>
                            <div class="invalid-feedback">비밀번호가 일치하지 않습니다.</div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-cupong flex-grow-1">변경</button>
                            <a th:href="@{/members/mypage}" class="btn btn-outline-secondary flex-grow-1">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.querySelector('form').addEventListener('submit', function (e) {
        const pw = document.querySelector('[name=newPassword]');
        const confirm = document.getElementById('confirmPassword');
        if (pw.value !== confirm.value) {
            e.preventDefault();
            confirm.classList.add('is-invalid');
        }
    });
</script>
</body>
</html>
