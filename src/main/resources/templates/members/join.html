<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('회원가입')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <h3 class="fw-bold mb-4 text-center">회원가입</h3>
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/members/join}" th:object="${memberJoinRequest}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">이메일</label>
                            <input type="email" th:field="*{email}" class="form-control"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" placeholder="example@email.com">
                            <div class="invalid-feedback" th:errors="*{email}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">비밀번호</label>
                            <input type="password" th:field="*{password}" class="form-control"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" placeholder="8자 이상">
                            <div class="invalid-feedback" th:errors="*{password}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">이름</label>
                            <input type="text" th:field="*{name}" class="form-control"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" placeholder="홍길동">
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">전화번호 <span class="text-muted fw-normal">(선택)</span></label>
                            <input type="text" th:field="*{phone}" class="form-control" placeholder="010-0000-0000">
                        </div>
                        <button type="submit" class="btn btn-cupong w-100 py-2 fw-semibold">가입하기</button>
                    </form>
                </div>
            </div>
            <p class="text-center mt-3 text-muted">
                이미 계정이 있으신가요? <a th:href="@{/members/login}" class="text-cupong fw-semibold">로그인</a>
            </p>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
