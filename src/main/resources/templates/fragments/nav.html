<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="nav" class="navbar navbar-expand-lg navbar-dark bg-cupong shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" th:href="@{/}">
            <i class="bi bi-bag-heart-fill"></i> Cupong
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <form class="d-flex mx-auto w-50" th:action="@{/products}" method="get">
                <input class="form-control me-2" type="search" name="keyword" placeholder="상품 검색...">
                <button class="btn btn-outline-light" type="submit"><i class="bi bi-search"></i></button>
            </form>
            <ul class="navbar-nav ms-auto align-items-lg-center gap-1">
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/members/join}"><i class="bi bi-person-plus"></i> 회원가입</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/members/login}"><i class="bi bi-box-arrow-in-right"></i> 로그인</a>
                </li>
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle"></i>
                        <span sec:authentication="name">사용자</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{/members/mypage}"><i class="bi bi-person"></i> 마이페이지</a></li>
                        <li><a class="dropdown-item" th:href="@{/orders}"><i class="bi bi-receipt"></i> 주문 내역</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/members/logout}" method="post">
                                <button class="dropdown-item text-danger" type="submit">
                                    <i class="bi bi-box-arrow-right"></i> 로그아웃
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/cart}"><i class="bi bi-cart3 fs-5"></i></a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin}"><i class="bi bi-gear-fill"></i> 관리자</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('DELIVERY')">
                    <a class="nav-link" th:href="@{/delivery}"><i class="bi bi-truck"></i> 배송 목록</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
