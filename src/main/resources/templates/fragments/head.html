<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | Cupong'">Cupong</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .bg-cupong  { background-color: #e30000; }
        .btn-cupong { background-color: #e30000; color: #fff; border: none; }
        .btn-cupong:hover { background-color: #c00000; color: #fff; }
        .text-cupong { color: #e30000; }
        .product-card { transition: transform .2s; cursor: pointer; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
        .product-img { height: 200px; object-fit: cover; }
    </style>
</head>
</html>
