<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('상품 목록')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="container my-4">
    <!-- 카테고리 필터 -->
    <div class="mb-3 d-flex flex-wrap gap-2">
        <a th:href="@{/products}" class="btn btn-sm"
           th:classappend="${selectedCategoryId == null and keyword == null} ? 'btn-cupong' : 'btn-outline-secondary'">전체</a>
        <a th:each="cat : ${categories}"
           th:href="@{/products(categoryId=${cat.id})}"
           th:text="${cat.name}"
           class="btn btn-sm"
           th:classappend="${selectedCategoryId == cat.id} ? 'btn-cupong' : 'btn-outline-secondary'">카테고리</a>
    </div>

    <!-- 검색 결과 안내 -->
    <p th:if="${keyword}" class="text-muted">
        <strong th:text="${keyword}"></strong> 검색 결과
        (<span th:text="${products.totalElements}">0</span>건)
    </p>

    <!-- 상품 그리드 -->
    <div class="row row-cols-2 row-cols-md-4 g-4">
        <div class="col" th:each="product : ${products.content}">
            <a th:href="@{/products/{id}(id=${product.id})}" class="text-decoration-none text-dark">
                <div class="card h-100 product-card">
                    <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://placehold.co/300x200?text=No+Image'}"
                         class="card-img-top product-img" th:alt="${product.name}">
                    <div class="card-body p-3">
                        <p class="small text-muted mb-1" th:text="${product.category?.name}">카테고리</p>
                        <h6 class="card-title mb-1" th:text="${product.name}">상품명</h6>
                        <p class="fw-bold text-cupong mb-0"
                           th:text="'₩' + ${#numbers.formatInteger(product.price, 1, 'COMMA')}">₩0</p>
                        <small class="text-muted" th:text="'재고 ' + ${product.stock} + '개'">재고</small>
                    </div>
                </div>
            </a>
        </div>
    </div>
    <p th:if="${products.content.empty}" class="text-center text-muted py-5">상품이 없습니다.</p>

    <!-- 페이지네이션 -->
    <nav th:if="${products.totalPages > 1}" class="mt-4 d-flex justify-content-center">
        <ul class="pagination">
            <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                <a class="page-link" th:href="@{/products(page=${products.number - 1}, keyword=${keyword}, categoryId=${selectedCategoryId})}">이전</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                th:classappend="${i == products.number} ? 'active'">
                <a class="page-link" th:text="${i + 1}"
                   th:href="@{/products(page=${i}, keyword=${keyword}, categoryId=${selectedCategoryId})}">1</a>
            </li>
            <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                <a class="page-link" th:href="@{/products(page=${products.number + 1}, keyword=${keyword}, categoryId=${selectedCategoryId})}">다음</a>
            </li>
        </ul>
    </nav>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
